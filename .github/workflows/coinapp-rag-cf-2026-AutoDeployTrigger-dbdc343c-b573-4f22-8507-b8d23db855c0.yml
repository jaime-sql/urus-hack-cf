name: Trigger auto deployment for coinapp-rag-cf-2026

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/coinapp-rag-cf-2026-AutoDeployTrigger-dbdc343c-b573-4f22-8507-b8d23db855c0.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.COINAPPRAGCF2026_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COINAPPRAGCF2026_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COINAPPRAGCF2026_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: acrhackcf2026.azurecr.io
          registryUsername: ${{ secrets.COINAPPRAGCF2026_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.COINAPPRAGCF2026_REGISTRY_PASSWORD }}
          containerAppName: coinapp-rag-cf-2026
          resourceGroup: hackCF2026
          imageToBuild: acrhackcf2026.azurecr.io/coinapp-rag-cf-2026:${{ github.sha }}


